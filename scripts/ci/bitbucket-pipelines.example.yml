# Sample Bitbucket Pipelines config for the AI Tech Lead framework guardrail (Bitbucket CLOUD).
# Copy the `docs-sync-check` step into your repo's bitbucket-pipelines.yml (merge with any existing
# steps). It runs the same host-agnostic check as the GitHub Actions workflow.
#
# IMPORTANT: Bitbucket DATA CENTER does not run Pipelines. There, wire the required build described
# in docs/ci-integration.md into Bamboo/Jenkins instead (framework-state check + lint/build/test gate,
# blocking via the "required builds" merge check).

image: atlassian/default-image:4

definitions:
  steps:
    - step: &docs-sync-check
        name: AI Tech Lead framework state
        script:
          - bash scripts/docs-sync-check.sh

pipelines:
  pull-requests:
    '**':
      - step: *docs-sync-check
  branches:
    '{main,master}':
      - step: *docs-sync-check
