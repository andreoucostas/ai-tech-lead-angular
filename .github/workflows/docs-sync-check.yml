name: Docs sync check

# GitHub Actions wrapper. The actual checks live in scripts/docs-sync-check.sh so they run
# ANYWHERE — GitHub Actions, Bitbucket Pipelines, Bamboo, Jenkins, a pre-receive hook, or locally.
#
# This .yml is GitHub-only. On Bitbucket Data Center (no GitHub Actions), wire
# scripts/docs-sync-check.sh into a Bamboo/Jenkins job or a pre-receive hook, and optionally publish
# the result to the PR via the Code Insights API. A Bitbucket Pipelines sample (Bitbucket Cloud) is
# in scripts/ci/bitbucket-pipelines.example.yml. See the README "Running on Bitbucket Data Center".

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  docs-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AI Tech Lead framework state
        run: bash scripts/docs-sync-check.sh
